services:
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - backend

  backend:
    depends_on:
      redis:
        condition: service_started
    build:
      context: .
      dockerfile: ./Server/Dockerfile
    environment:
      REDIS_HOST: redis
    restart: always
    ports:
      - 3000:3000
    networks:
      - backend
      - frontend

  frontend:
    build:
      context: .
      dockerfile: ./Client/Dockerfile
      args:
        - VITE_BASE_URL=astro-quiz.germanywestcentral.cloudapp.azure.com
    restart: always
    ports:
      - 8080:80
      - 4444:443
    networks:
      - frontend

networks:
  backend:
  frontend:

volumes:
  redis_data:
